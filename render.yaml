services:
  - type: web
    name: if-i-were-backend
    runtime: node
    rootDir: if_I_were_project/backend
    buildCommand: npm ci
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
